spring.application.name=supply-chain-visualizer

# Embedded H2 (file-based) for demo use
spring.datasource.url=jdbc:h2:file:./data/supply_chain_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# Disable data.sql for H2 demo (Postgres-specific SQL)
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=${JWT_SECRET:dev_secret_change_me}
app.jwtSecret=${JWT_SECRET:dev_secret_change_me}
jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
