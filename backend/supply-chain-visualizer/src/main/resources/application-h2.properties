spring.application.name=supply-chain-visualizer

# Embedded H2 (file-based) for demo use
spring.datasource.url=jdbc:h2:file:./data/supply_chain_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
# Flyway migrations are Postgres-specific; H2 demo relies on Hibernate DDL
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:dev_secret_change_me_needs_to_be_at_least_64_bytes_long_for_hmac_sha512_}
jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
