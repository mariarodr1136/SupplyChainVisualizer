services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supply_chain_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supply_chain_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend/supply-chain-visualizer
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/supply_chain_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: local_compose_secret_change_me_needs_to_be_at_least_64_bytes_long_for_hmac_sha512
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
